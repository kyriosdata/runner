name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build Multi-plataforma
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: darwin
            goarch: amd64
            ext: ""

    defaults:
      run:
        working-directory: projetos/assinatura

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: projetos/assinatura/go.sum

      - name: Download Dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -v -o assinatura-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: assinatura-${{ matrix.goos }}-${{ matrix.goarch }}
          path: projetos/assinatura/assinatura-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          retention-days: 7
